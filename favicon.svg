<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- Dark background with rounded corners -->
  <rect width="36" height="36" rx="9" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0806"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
  </defs>
  <!-- Subtle copper ring decorations -->
  <circle cx="18" cy="18" r="11" fill="none" stroke="#c87941" stroke-width="0.6" opacity="0.3"/>
  <circle cx="18" cy="18" r="6" fill="none" stroke="#c87941" stroke-width="0.4" opacity="0.18"/>
  <line x1="18" y1="4" x2="18" y2="32" stroke="#c87941" stroke-width="0.4" opacity="0.14"/>
  <line x1="4" y1="18" x2="32" y2="18" stroke="#c87941" stroke-width="0.4" opacity="0.14"/>
  <!-- D letterform -->
  <text x="18" y="24" font-family="'DM Sans', -apple-system, sans-serif" font-weight="700" font-size="17" fill="#c87941" text-anchor="middle" letter-spacing="-1" filter="url(#glow)">D</text>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
