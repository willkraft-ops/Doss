<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doss — Daily Dossier</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream-150:#e4ddd0;--cream-200:#dbd3c4;--cream-300:#ccc2b0;--cream-400:#b5a894;
  --bg:#e6dfd4;--paper:#f5f0e8;--paper-border:#cec6b6;
  /* Warmer, richer dark palette with more amber in it */
  --dark-900:#0e0b08;--dark-800:#181208;--dark-750:#1e160c;--dark-700:#231a0f;
  --dark-600:#2c2013;--dark-500:#37291a;--dark-400:#473620;--dark-300:#5c472e;
  --dark-200:#7a6248;--dark-100:#b09272;--dark-50:#d4b898;
  --accent:#c87941;--accent-warm:#d4894e;--accent-light:#e0a870;
  --accent-bg:rgba(200,121,65,0.13);--accent-border:rgba(200,121,65,0.28);
  --green:#5a8c66;--green-bg:rgba(90,140,102,0.12);--green-border:rgba(90,140,102,0.26);
  --yellow:#c49520;--red:#b05a3a;
  --text:#2c2520;--text-secondary:#6b6058;--text-muted:#9c9080;
  --dk-text:#ede6da;--dk-text-secondary:#b09272;--dk-text-muted:#5c472e;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif;--serif:'DM Serif Display',Georgia,serif;
  --radius:8px;
  --shadow-glow:0 0 0 1px rgba(200,121,65,0.20),0 2px 16px rgba(200,121,65,0.14);
  --paper-shadow:0 1px 2px rgba(44,37,32,0.06),0 4px 16px rgba(44,37,32,0.10),0 12px 40px rgba(44,37,32,0.08);
  /* Depth shadows for dark surfaces */
  --card-shadow:0 1px 0 rgba(255,255,255,0.04) inset,0 -1px 0 rgba(0,0,0,0.2) inset;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;
  background-image:linear-gradient(rgba(181,112,58,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(181,112,58,0.018) 1px,transparent 1px);background-size:28px 28px;}
.app{display:flex;height:100vh;}

/* SIDEBAR — warm amber underglow, subtle grain */
.sidebar{width:300px;min-width:300px;border-right:1px solid var(--dark-600);display:flex;flex-direction:column;overflow:hidden;position:relative;
  background:var(--dark-800);
  background-image:
    radial-gradient(ellipse at 50% 110%,rgba(200,121,65,0.12) 0%,transparent 65%),
    radial-gradient(ellipse at 20% 0%,rgba(200,121,65,0.04) 0%,transparent 50%);
}
.sidebar-header{padding:18px 18px 0;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.logo-text{font-size:22px;font-family:var(--serif);font-weight:400;letter-spacing:-0.3px;color:var(--dk-text);}
.logo-sub{font-size:10px;color:var(--dk-text-muted);font-weight:400;letter-spacing:0.5px;text-transform:uppercase;}
.settings-toggle{width:26px;height:26px;border-radius:6px;border:1px solid var(--dark-500);background:var(--dark-700);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dk-text-muted);transition:all 0.15s;margin-left:auto;box-shadow:var(--card-shadow);}
.settings-toggle:hover{background:var(--dark-600);color:var(--dk-text-secondary);}
.settings-toggle.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.auth-bar{margin:10px 18px 0;}
.google-btn{width:100%;padding:8px 11px;border-radius:var(--radius);border:1px solid var(--dark-500);background:var(--dark-700);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--dk-text-secondary);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;justify-content:center;box-shadow:var(--card-shadow);}
.google-btn:hover{background:var(--dark-600);color:var(--dk-text);}
.google-btn.signed-in{background:var(--green-bg);border-color:var(--green-border);color:var(--green);cursor:default;}

/* SETTINGS */
.settings-panel{display:none;padding:14px 18px;border-top:1px solid var(--dark-600);flex-shrink:0;max-height:50vh;overflow-y:auto;}
.settings-panel.open{display:block;}
.settings-panel::-webkit-scrollbar{width:3px;}
.settings-panel::-webkit-scrollbar-thumb{background:var(--dark-400);border-radius:2px;}
.settings-panel label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--dk-text-muted);margin-bottom:5px;}
.settings-panel label:not(:first-child){margin-top:14px;}
.api-bar{padding:9px 11px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);display:flex;align-items:center;gap:8px;}
.api-bar.connected{background:var(--green-bg);border-color:var(--green-border);}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.api-bar.connected .api-dot{background:var(--green);}
.api-lbl{font-size:10px;font-weight:600;color:var(--dk-text-muted);text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;}
.api-input{flex:1;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--dk-text);outline:none;}
.api-input::placeholder{color:var(--dk-text-muted);}
.settings-textarea{width:100%;padding:9px 11px;border:1px solid var(--dark-500);border-radius:var(--radius);font-family:var(--sans);font-size:12px;color:var(--dk-text);background:var(--dark-750);outline:none;resize:vertical;min-height:80px;line-height:1.5;transition:border-color 0.15s;}
.settings-textarea:focus{border-color:var(--accent-border);}
.settings-textarea::placeholder{color:var(--dk-text-muted);}
.settings-hint{font-size:11px;color:var(--dk-text-muted);margin-top:3px;line-height:1.4;}
.save-indicator{display:inline-block;font-size:11px;color:var(--green);font-weight:500;margin-left:8px;opacity:0;transition:opacity 0.3s;}
.save-indicator.show{opacity:1;}

/* SEARCH */
.search-bar{padding:8px 10px;flex-shrink:0;position:relative;}
.search-input{width:100%;padding:7px 10px 7px 30px;border-radius:6px;border:1px solid var(--dark-500);background:var(--dark-750);font-family:var(--sans);font-size:12px;color:var(--dk-text);outline:none;transition:border-color 0.15s;box-shadow:var(--card-shadow);}
.search-input:focus{border-color:var(--accent-border);}
.search-input::placeholder{color:var(--dk-text-muted);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--dk-text-muted);pointer-events:none;}
.search-results{position:absolute;top:100%;left:10px;right:10px;background:var(--dark-700);border:1px solid var(--dark-500);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:200;max-height:280px;overflow-y:auto;display:none;}
.search-results.open{display:block;}
.search-results::-webkit-scrollbar{width:3px;}
.search-results::-webkit-scrollbar-thumb{background:var(--dark-400);border-radius:2px;}
.search-result{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--dark-600);transition:background 0.1s;}
.search-result:last-child{border-bottom:none;}
.search-result:hover{background:var(--dark-600);}
.search-result-name{font-size:12.5px;font-weight:600;color:var(--dk-text);margin-bottom:2px;}
.search-result-meta{font-size:11px;color:var(--dk-text-muted);font-family:var(--mono);}
.search-empty{padding:14px 12px;font-size:12px;color:var(--dk-text-muted);text-align:center;}

/* DATE + MEETINGS */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;}
.date-label{font-weight:600;font-size:13px;color:var(--dk-text);}
.date-sub{font-size:11px;color:var(--dk-text-muted);}
.day-nav{display:flex;gap:4px;}
.day-nav button{width:26px;height:26px;border-radius:6px;border:1px solid var(--dark-500);background:var(--dark-700);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dk-text-muted);transition:all 0.15s;box-shadow:var(--card-shadow);}
.day-nav button:hover{background:var(--dark-600);color:var(--dk-text);}
.meeting-list-header{padding:4px 18px 6px;display:flex;align-items:center;justify-content:space-between;}
.meeting-list-header span{font-size:10px;text-transform:uppercase;letter-spacing:0.9px;color:var(--dk-text-muted);font-weight:600;}
.meeting-count{font-family:var(--mono);font-size:10px;color:var(--dk-text-muted);}
.meeting-list{flex:1;overflow-y:auto;padding:0 10px 10px;}
.meeting-list::-webkit-scrollbar{width:3px;}
.meeting-list::-webkit-scrollbar-thumb{background:var(--dark-400);border-radius:2px;}
.meeting-card{padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all 0.18s;border:1px solid transparent;margin-bottom:3px;position:relative;}
.meeting-card:hover{background:var(--dark-700);border-color:var(--dark-500);}
.meeting-card.active{background:var(--dark-700);border-color:var(--accent-border);box-shadow:var(--shadow-glow),var(--card-shadow);}
.meeting-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px;}
.meeting-time{font-family:var(--mono);font-size:10.5px;color:var(--accent);font-weight:500;}
.meeting-status{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.status-none{background:var(--dark-400);}
.status-ready{background:#6b9c77;box-shadow:0 0 6px rgba(90,140,102,0.4);}
.status-generating{background:var(--yellow);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.meeting-name{font-weight:600;font-size:12.5px;color:var(--dk-text);margin-bottom:1px;line-height:1.3;}
.meeting-meta{font-size:11px;color:var(--dk-text-muted);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);
  background-image:linear-gradient(rgba(180,160,130,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,130,0.05) 1px,transparent 1px);background-size:24px 24px;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:10px;padding:40px;}
.empty-icon{width:44px;height:44px;background:var(--cream-200);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.empty-state h3{font-size:15px;font-weight:600;color:var(--text-secondary);}
.empty-state p{font-size:13px;text-align:center;max-width:300px;line-height:1.6;}

/* DETAIL HEADER */
.detail-header{padding:16px 22px;border-bottom:1px solid var(--dark-600);flex-shrink:0;
  background:var(--dark-750);
  background-image:radial-gradient(ellipse at 0% 120%,rgba(200,121,65,0.08) 0%,transparent 60%);
  box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;}
.detail-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;gap:12px;}
.detail-title{font-size:18px;font-weight:700;letter-spacing:-0.4px;color:var(--dk-text);}
.detail-time{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 9px;border-radius:5px;flex-shrink:0;}
.detail-attendees{font-size:12px;color:var(--dk-text-secondary);}

/* ACTION BAR */
.action-bar{padding:9px 22px;border-bottom:1px solid var(--dark-600);background:var(--dark-800);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;
  box-shadow:0 1px 0 rgba(255,255,255,0.02) inset;}
.pill-toggle{display:inline-flex;background:var(--dark-900);border:1px solid var(--dark-600);border-radius:20px;padding:3px;gap:2px;position:relative;}
.pill-slider{position:absolute;top:3px;left:3px;height:calc(100% - 6px);background:var(--dark-600);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 2px 6px rgba(0,0,0,0.3);transition:transform 0.22s cubic-bezier(0.34,1.2,0.64,1),width 0.22s cubic-bezier(0.34,1.2,0.64,1);z-index:0;pointer-events:none;}
.pill-opt{padding:5px 18px;border-radius:16px;border:none;background:transparent;font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--dk-text-muted);cursor:pointer;transition:color 0.18s;white-space:nowrap;display:flex;align-items:center;gap:5px;position:relative;z-index:1;}
.pill-opt.active{color:var(--dk-text);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.action-btns{display:flex;gap:6px;}
.gen-btn{padding:7px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:7px;box-shadow:0 1px 6px rgba(200,121,65,0.25),0 1px 0 rgba(255,255,255,0.1) inset;}
.gen-btn:hover{background:var(--accent-warm);}
.gen-btn:disabled{background:var(--dark-400);box-shadow:none;cursor:not-allowed;color:var(--dk-text-muted);}
.gen-btn.secondary{background:var(--dark-600);color:var(--dk-text-secondary);border:1px solid var(--dark-500);box-shadow:var(--card-shadow);}
.gen-btn.secondary:hover{background:var(--dark-500);color:var(--dk-text);}
.panes-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.tab-pane{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity 0.18s;}
.tab-pane.active{opacity:1;pointer-events:all;}

/* BRIEF */
.brief-layout{flex:1;display:flex;overflow:hidden;}
.brief-toc-col{width:168px;min-width:168px;overflow-y:auto;padding:18px 10px 18px 14px;border-right:1px solid var(--dark-600);display:flex;flex-direction:column;gap:1px;background:var(--dark-800);}
.brief-toc-col::-webkit-scrollbar{width:3px;}
.brief-toc-col::-webkit-scrollbar-thumb{background:var(--dark-400);border-radius:2px;}
.toc-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--dk-text-muted);padding:0 7px 6px;border-bottom:1px solid var(--dark-600);margin-bottom:4px;}
.toc-item{display:block;font-size:11.5px;font-weight:500;color:var(--dk-text-muted);padding:5px 7px;border-radius:4px;line-height:1.35;transition:all 0.12s;cursor:pointer;border-left:2px solid transparent;}
.toc-item:hover{color:var(--dk-text-secondary);background:var(--dark-600);}
.toc-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-bg);font-weight:600;}
.toc-skeleton{padding:5px 7px;display:flex;flex-direction:column;gap:7px;}
.toc-skel{height:10px;background:var(--dark-600);border-radius:3px;animation:shimmer 1.5s infinite;}
.toc-skel:nth-child(2){width:75%;}.toc-skel:nth-child(3){width:85%;}.toc-skel:nth-child(4){width:60%;}
.toc-skel:nth-child(5){width:80%;}.toc-skel:nth-child(6){width:70%;}.toc-skel:nth-child(7){width:55%;}
@keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.7}}
.brief-paper-col{flex:1;overflow-y:auto;padding:28px 32px 48px;display:flex;flex-direction:column;}
.brief-paper-col::-webkit-scrollbar{width:4px;}
.brief-paper-col::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}
.search-status{font-family:var(--mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:9px;padding:0 0 14px;min-height:34px;transition:opacity 0.5s;}
.search-status.faded{opacity:0.3;}
.brief-paper{background:var(--paper);border:1px solid var(--paper-border);border-left:3px solid rgba(200,121,65,0.25);border-radius:2px;box-shadow:var(--paper-shadow);padding:40px 48px 40px 52px;position:relative;}
.brief-paper::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(transparent,transparent 27px,rgba(181,112,58,0.04) 27px,rgba(181,112,58,0.04) 28px);pointer-events:none;border-radius:2px;}
.brief-paper h1{font-family:var(--serif);font-size:22px;font-weight:400;color:#1a1612;letter-spacing:-0.2px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--paper-border);line-height:1.25;}
.brief-paper h2{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--accent);margin-top:28px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(200,121,65,0.18);scroll-margin-top:16px;}
.brief-paper h2:first-of-type{margin-top:0;}
.brief-paper h3{font-size:12px;font-weight:600;color:var(--text-secondary);margin-top:12px;margin-bottom:3px;font-style:italic;}
.brief-paper p{font-size:13.5px;line-height:1.68;margin-bottom:7px;color:var(--text);}
.brief-paper p:last-child{margin-bottom:0;}
.brief-paper ul{margin:4px 0 8px 0;list-style:none;}
.brief-paper ul li{font-size:13.5px;line-height:1.65;margin-bottom:4px;padding-left:16px;color:var(--text);position:relative;}
.brief-paper ul li::before{content:'—';position:absolute;left:0;color:var(--cream-400);font-size:12px;line-height:1.65;}
.brief-paper ol{margin:4px 0 8px 14px;}
.brief-paper ol li{font-size:13.5px;line-height:1.65;margin-bottom:4px;color:var(--text);}
.brief-paper strong{font-weight:600;color:#1a1612;}
.brief-paper em{color:var(--text-secondary);}
.brief-paper code{font-family:var(--mono);font-size:11.5px;background:var(--cream-200);padding:1px 5px;border-radius:2px;color:var(--accent);}
.brief-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:60px 40px;color:var(--text-muted);}
.brief-empty-icon{width:52px;height:52px;background:var(--cream-200);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;}
.brief-empty h4{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;}
.brief-empty p{font-size:13px;line-height:1.5;max-width:300px;}

/* DEAL ROOM */
.deal-room{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Context bar */
.context-bar{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--dark-600);flex-shrink:0;
  background:var(--dark-750);
  background-image:radial-gradient(ellipse at 0% 120%,rgba(200,121,65,0.07) 0%,transparent 60%);
  box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;}
.context-bar-icon{width:22px;height:22px;border-radius:5px;background:var(--dark-600);border:1px solid var(--dark-500);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.context-bar-text{flex:1;}
.context-bar-title{font-size:17px;font-family:var(--serif);font-weight:400;letter-spacing:-0.2px;color:var(--dk-text);line-height:1.2;margin-bottom:3px;}
.context-bar-sub{font-size:11px;color:var(--dk-text-secondary);line-height:1.4;}
.context-bar-sub a{color:var(--accent);text-decoration:none;cursor:pointer;font-family:var(--mono);font-size:10px;}
.context-bar-sub a:hover{text-decoration:underline;}
.context-bar-badge{font-family:var(--mono);font-size:11.5px;color:var(--accent);font-weight:500;background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 9px;border-radius:5px;flex-shrink:0;}
.context-bar-gather{padding:6px 14px;border-radius:5px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:11.5px;font-weight:600;cursor:pointer;transition:all 0.2s;flex-shrink:0;box-shadow:0 1px 4px rgba(200,121,65,0.25),0 1px 0 rgba(255,255,255,0.1) inset;}
.context-bar-gather:hover{background:var(--accent-warm);}

/* Messages — paper with grid lines */
.deal-room-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:0;
  background:var(--paper);
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(181,112,58,0.04) 27px,rgba(181,112,58,0.04) 28px);}
.deal-room-msgs::-webkit-scrollbar{width:4px;}
.deal-room-msgs::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}
.deal-room-empty{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--text-muted);font-size:12.5px;line-height:1.7;}

/* Message groups — user and assistant visually distinct */
.msg-group{display:flex;flex-direction:column;margin-bottom:16px;}
.msg-group:last-child{margin-bottom:0;}

/* User messages — warm dark pill */
.msg-user{align-self:flex-end;max-width:82%;background:var(--dark-600);border:1px solid var(--dark-500);border-radius:12px 12px 3px 12px;padding:9px 13px;
  box-shadow:0 1px 0 rgba(255,255,255,0.04) inset,0 2px 8px rgba(0,0,0,0.2);}
.msg-user-text{font-size:13px;line-height:1.55;color:var(--dk-text);}

/* Assistant messages — clean on paper */
.msg-assistant{align-self:flex-start;max-width:100%;}
.msg-assistant-header{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.msg-avatar{width:20px;height:20px;border-radius:4px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-avatar-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.msg-assistant-body{font-size:13px;line-height:1.62;color:var(--text);padding-left:27px;}
.msg-assistant-body p{margin:0 0 6px;}
.msg-assistant-body p:last-child{margin:0;}
.msg-assistant-body ul{margin:4px 0 6px 16px;}
.msg-assistant-body li{margin-bottom:3px;}
.msg-assistant-body strong{font-weight:600;color:#1a1612;}
.msg-assistant-body code{font-family:var(--mono);font-size:11.5px;background:var(--cream-200);padding:1px 5px;border-radius:2px;color:var(--accent);}
.msg-copy-btn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;margin-left:27px;padding:3px 9px;border-radius:4px;border:1px solid var(--paper-border);background:transparent;font-family:var(--sans);font-size:10.5px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.msg-copy-btn:hover{background:var(--cream-150);color:var(--text);}

/* Email card */
.email-card{margin-top:8px;margin-left:27px;background:var(--paper);border:1px solid var(--paper-border);border-left:3px solid rgba(200,121,65,0.3);border-radius:2px;box-shadow:var(--paper-shadow);overflow:hidden;}
.email-card-header{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--paper-border);background:rgba(200,121,65,0.05);}
.email-card-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);}
.email-card-copy{padding:3px 9px;border-radius:4px;border:1px solid var(--paper-border);background:transparent;font-family:var(--sans);font-size:10.5px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.email-card-copy:hover{background:var(--cream-150);color:var(--text);}
.email-card-body{padding:16px 18px;font-size:13.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;}

/* Thinking indicator */
.msg-thinking{padding-left:27px;font-size:12.5px;color:var(--text-muted);font-style:italic;}

/* Input — dark chrome */
.deal-room-input{padding:10px 14px;border-top:1px solid var(--dark-600);display:flex;gap:8px;background:var(--dark-800);flex-shrink:0;
  box-shadow:0 -1px 0 rgba(0,0,0,0.2);}
.tc-input{flex:1;border:1px solid var(--dark-500);border-radius:6px;padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--dk-text);background:var(--dark-700);outline:none;resize:none;min-height:36px;max-height:100px;transition:border-color 0.15s;line-height:1.5;box-shadow:var(--card-shadow);}
.tc-input:focus{border-color:var(--accent-border);}
.tc-input::placeholder{color:var(--dk-text-muted);}
.tc-send{padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;flex-shrink:0;box-shadow:0 1px 4px rgba(200,121,65,0.2),0 1px 0 rgba(255,255,255,0.1) inset;}
.tc-send:hover{background:var(--accent-warm);}
.tc-send:disabled{background:var(--dark-400);cursor:not-allowed;box-shadow:none;}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner.dark{border-color:var(--dark-400);border-top-color:var(--accent);}
.spinner.light{border-color:rgba(200,121,65,0.2);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script>
const GOOGLE_CLIENT_ID='545043452179-k57aahlhjd5o8u2h8ehpsoftvi1ian8r.apps.googleusercontent.com';
const CALENDAR_SCOPES='https://www.googleapis.com/auth/calendar.readonly';

const STATE={
  accessToken:null,orgDomain:'',dayCache:{},
  activeMeetingId:null,activeTab:'brief',currentDate:new Date(),
  timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
  briefs:{},transcripts:{},tcChats:{},
  generating:{},gatheringContext:{},
  meetingIndex:{},contextFetchTime:{},
  model:'claude-sonnet-4-20250514',
  briefTemplate:localStorage.getItem('doss_template')||'',
};

function saveState(){
  try{
    localStorage.setItem('doss_briefs',JSON.stringify(STATE.briefs));
    localStorage.setItem('doss_tcchats',JSON.stringify(STATE.tcChats));
    localStorage.setItem('doss_mindex',JSON.stringify(STATE.meetingIndex));
    localStorage.setItem('doss_fetchtime',JSON.stringify(STATE.contextFetchTime));
  }catch(e){console.warn('State save failed:',e);}
}
function loadState(){
  try{
    const b=localStorage.getItem('doss_briefs'),c=localStorage.getItem('doss_tcchats');
    const mi=localStorage.getItem('doss_mindex'),ft=localStorage.getItem('doss_fetchtime');
    if(b)STATE.briefs=JSON.parse(b);
    if(c)STATE.tcChats=JSON.parse(c);
    if(mi)STATE.meetingIndex=JSON.parse(mi);
    if(ft)STATE.contextFetchTime=JSON.parse(ft);
  }catch(e){}
}
loadState();

// ── GOOGLE AUTH ──
let tokenClient;
function setGoogleSignedIn(token){
  STATE.accessToken=token;
  const btn=document.getElementById('googleBtn');
  btn.classList.add('signed-in');
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Calendar Connected';
}
function initGoogleAuth(){
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGoogleAuth,200);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,scope:CALENDAR_SCOPES,
    callback:async(r)=>{
      if(r.access_token){
        const expiry=Date.now()+(55*60*1000);
        localStorage.setItem('doss_gtoken',JSON.stringify({token:r.access_token,expiry}));
        setGoogleSignedIn(r.access_token);
        // Reliably set orgDomain from the user's own identity — not inferred from attendees
        try{
          const ui=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${r.access_token}`}});
          if(ui.ok){const ud=await ui.json();if(ud.email)STATE.orgDomain=emailDomain(ud.email);}
        }catch(e){console.warn('userinfo fetch failed:',e);}
        loadCurrentDay();backgroundLoadWeek();
      }
    },
  });
  try{
    const s=JSON.parse(localStorage.getItem('doss_gtoken')||'null');
    if(s&&s.token&&s.expiry>Date.now()){
      setGoogleSignedIn(s.token);
      // Also fetch orgDomain on cached token restore — not just fresh OAuth
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${s.token}`}})
        .then(r=>r.ok?r.json():null).then(ud=>{if(ud?.email)STATE.orgDomain=emailDomain(ud.email);}).catch(()=>{});
      loadCurrentDay();backgroundLoadWeek();return;
    }
  }catch(e){}
  setTimeout(()=>{if(!STATE.accessToken&&tokenClient)tokenClient.requestAccessToken({prompt:''});},500);
}
function handleGoogleAuth(){
  if(STATE.accessToken)return;
  if(!tokenClient){alert('Google auth not ready yet.');return;}
  tokenClient.requestAccessToken({prompt:'consent'});
}

// ── CALENDAR ──
async function fetchCalendarEvents(date){
  if(!STATE.accessToken)return[];
  const s=new Date(date);s.setHours(0,0,0,0);
  const e=new Date(date);e.setHours(23,59,59,999);
  const params=new URLSearchParams({timeMin:s.toISOString(),timeMax:e.toISOString(),singleEvents:'true',orderBy:'startTime',maxResults:'50',timeZone:STATE.timezone});
  try{
    const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,{headers:{Authorization:`Bearer ${STATE.accessToken}`}});
    if(res.status===401){
      STATE.accessToken=null;localStorage.removeItem('doss_gtoken');
      const btn=document.getElementById('googleBtn');
      btn.classList.remove('signed-in');btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Reconnect Google';
      if(tokenClient)setTimeout(()=>tokenClient.requestAccessToken({prompt:''}),300);
      return[];
    }
    const data=await res.json();
    return(data.items||[]).map(ev=>({
      id:ev.id,title:ev.summary||'Untitled',
      startTime:ev.start?.dateTime||ev.start?.date,endTime:ev.end?.dateTime||ev.end?.date,
      attendees:(ev.attendees||[]).map(a=>({name:a.displayName||a.email,email:a.email})),
      location:ev.location||null
    }));
  }catch(err){return[];}
}
function emailDomain(e){if(!e||!e.includes('@'))return'';return e.split('@')[1].toLowerCase();}
function detectOrgDomain(events){
  const c={};
  events.forEach(ev=>{(ev.attendees||[]).forEach(a=>{
    const d=emailDomain(a.email);
    if(d&&!d.includes('gmail.com')&&!d.includes('resource.calendar.google.com'))c[d]=(c[d]||0)+1;
  });});
  let best='',max=0;Object.entries(c).forEach(([d,n])=>{if(n>max){best=d;max=n;}});
  return best;
}
function isExternal(m,org){
  const att=m.attendees||[];if(att.length<=1)return false;if(!org)return true;
  return att.some(a=>{const d=emailDomain(a.email);return d&&d!==org&&!d.includes('resource.calendar.google.com');});
}
async function loadDay(date){
  const key=dateKey(date);if(STATE.dayCache[key])return STATE.dayCache[key];
  const all=await fetchCalendarEvents(date);
  if(!STATE.orgDomain&&all.length>0)STATE.orgDomain=detectOrgDomain(all);
  const ext=all.filter(m=>isExternal(m,STATE.orgDomain));
  ext.sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  STATE.dayCache[key]=ext;
  // Persist to meetingIndex so search works across all time, not just loaded days
  ext.forEach(m=>{STATE.meetingIndex[m.id]={id:m.id,title:m.title,startTime:m.startTime,endTime:m.endTime,attendees:m.attendees,dateKey:key};});
  try{localStorage.setItem('doss_mindex',JSON.stringify(STATE.meetingIndex));}catch(e){}
  return ext;
}
async function loadCurrentDay(){
  document.getElementById('meetingList').innerHTML='<div style="padding:18px;text-align:center;color:var(--dk-text-muted);font-size:13px;"><div class="spinner dark" style="margin:0 auto 8px;"></div>Loading…</div>';
  await loadDay(STATE.currentDate);renderMeetingList();updateDateBar();
}
async function backgroundLoadWeek(){
  const dow=STATE.currentDate.getDay(),monday=new Date(STATE.currentDate);
  monday.setDate(STATE.currentDate.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:5},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;}).filter(d=>!STATE.dayCache[dateKey(d)]);
  await Promise.all(days.map(async d=>{await loadDay(d);if(dateKey(STATE.currentDate)===dateKey(d))renderMeetingList();}));
}
function getCurrentMeetings(){return STATE.dayCache[dateKey(STATE.currentDate)]||[];}
function dateKey(date){return new Intl.DateTimeFormat('en-CA',{timeZone:STATE.timezone,year:'numeric',month:'2-digit',day:'2-digit'}).format(date);}
function formatDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:STATE.timezone});}
function formatDateShort(d){return d.toLocaleDateString('en-US',{year:'numeric',timeZone:STATE.timezone});}
function formatTime(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:STATE.timezone});}
function formatTimeRange(s,e){return`${formatTime(s)} – ${formatTime(e)}`;}
function getTzAbbr(){try{return new Intl.DateTimeFormat('en-US',{timeZone:STATE.timezone,timeZoneName:'short'}).formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||STATE.timezone;}catch{return STATE.timezone;}}
function updateDateBar(){document.getElementById('dateLabel').textContent=formatDate(STATE.currentDate);document.getElementById('dateSub').textContent=formatDateShort(STATE.currentDate);}

// ── SEARCH ──
function initSearch(){
  const input=document.getElementById('searchInput');
  const results=document.getElementById('searchResults');
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase();
    if(!q){results.classList.remove('open');return;}
    // Search meetingIndex (all-time) not just dayCache (this session)
    const matches=[];
    Object.values(STATE.meetingIndex).forEach(m=>{
      const titleMatch=m.title.toLowerCase().includes(q);
      const attendeeMatch=(m.attendees||[]).some(a=>(a.name||'').toLowerCase().includes(q)||(a.email||'').toLowerCase().includes(q));
      if(titleMatch||attendeeMatch)matches.push(m);
    });
    matches.sort((a,b)=>b.dateKey.localeCompare(a.dateKey));
    if(matches.length===0){
      results.innerHTML=`<div class="search-empty">No meetings found</div>`;
    }else{
      results.innerHTML=matches.slice(0,8).map(m=>{
        const d=new Date(m.dateKey+'T12:00:00');
        const label=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        return`<div class="search-result" data-id="${m.id}" data-date="${m.dateKey}">
          <div class="search-result-name">${esc(m.title)}</div>
          <div class="search-result-meta">${label} · ${formatTimeRange(m.startTime,m.endTime)}</div>
        </div>`;
      }).join('');
      results.querySelectorAll('.search-result').forEach(r=>{
        r.addEventListener('click',async()=>{
          const targetDate=new Date(r.dataset.date+'T12:00:00');
          STATE.currentDate=targetDate;
          STATE.activeMeetingId=r.dataset.id;
          STATE.activeTab='brief';
          updateDateBar();
          // Load the day if it's not already in dayCache
          if(!STATE.dayCache[r.dataset.date])await loadDay(targetDate);
          renderMeetingList();renderDetail();
          input.value='';results.classList.remove('open');
        });
      });
    }
    results.classList.add('open');
  });
  input.addEventListener('blur',()=>setTimeout(()=>results.classList.remove('open'),150));
  input.addEventListener('focus',()=>{if(input.value.trim())results.classList.add('open');});
}

// ── MEETING LIST ──
function renderMeetingList(){
  const list=document.getElementById('meetingList'),count=document.getElementById('meetingCount'),meetings=getCurrentMeetings();
  if(!STATE.accessToken){list.innerHTML='<div style="padding:36px 18px;text-align:center;color:var(--dk-text-muted);font-size:13px;">Sign in with Google to load your calendar.</div>';count.textContent='—';return;}
  if(meetings.length===0){list.innerHTML='<div style="padding:36px 18px;text-align:center;color:var(--dk-text-muted);font-size:13px;">No external calls this day.</div>';count.textContent='0';return;}
  count.textContent=meetings.length;const tz=getTzAbbr();
  list.innerHTML=meetings.map(m=>{
    const isActive=m.id===STATE.activeMeetingId,hasBrief=!!STATE.briefs[m.id],isGen=!!STATE.generating[m.id];
    const sc=isGen?'status-generating':hasBrief?'status-ready':'status-none';
    const ac=(m.attendees||[]).length;
    return`<div class="meeting-card ${isActive?'active':''}" data-id="${m.id}">
      <div class="meeting-card-top"><span class="meeting-time">${formatTimeRange(m.startTime,m.endTime)} ${tz}</span><span class="meeting-status ${sc}"></span></div>
      <div class="meeting-name">${esc(m.title)}</div>
      <div class="meeting-meta">${ac} attendee${ac!==1?'s':''}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.meeting-card').forEach(card=>{
    card.addEventListener('click',()=>{STATE.activeMeetingId=card.dataset.id;STATE.activeTab='brief';renderMeetingList();renderDetail();});
  });
}

// ── RENDER DETAIL ──
function renderDetail(){
  const main=document.getElementById('mainPanel');
  const meeting=getCurrentMeetings().find(m=>m.id===STATE.activeMeetingId);
  if(!meeting){main.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>Select a meeting</h3><p>Click a meeting to generate a dossier or open the deal room.</p></div>`;return;}
  const tz=getTzAbbr(),attendeeStr=(meeting.attendees||[]).map(a=>a.name||a.email).join(', ');
  const hasBrief=!!STATE.briefs[meeting.id];
  const hasContext=Array.isArray(STATE.transcripts[meeting.id])&&STATE.transcripts[meeting.id].length>0;
  main.innerHTML=`
    <div class="detail-header">
      <div class="detail-header-top"><div class="detail-title">${esc(meeting.title)}</div><div class="detail-time">${formatTimeRange(meeting.startTime,meeting.endTime)} ${tz}</div></div>
      <div class="detail-attendees">${attendeeStr||'No attendees'}</div>
    </div>
    <div class="action-bar" id="actionBar">
      <div class="pill-toggle" id="pillToggle">
        <div class="pill-slider" id="pillSlider"></div>
        <button class="pill-opt active" data-tab="brief">Brief${hasBrief?'<span class="pill-dot"></span>':''}</button>
        <button class="pill-opt" data-tab="dealroom">Deal Room${hasContext?'<span class="pill-dot"></span>':''}</button>
      </div>
      <div class="action-btns" id="actionBtns"></div>
    </div>
    <div class="panes-wrap">
      <div class="tab-pane active" data-tab="brief" id="briefPane"></div>
      <div class="tab-pane" data-tab="dealroom" id="dealroomPane"></div>
    </div>`;
  positionPillSlider('brief');
  document.querySelectorAll('.pill-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tab=btn.dataset.tab;if(tab===STATE.activeTab)return;
      STATE.activeTab=tab;
      document.querySelectorAll('.pill-opt').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.dataset.tab===tab));
      positionPillSlider(tab);updateActionBtns(meeting);
    });
  });
  renderBriefPane(meeting);renderDealRoomPane(meeting);updateActionBtns(meeting);
}

function positionPillSlider(tab){
  const slider=document.getElementById('pillSlider'),active=document.querySelector(`.pill-opt[data-tab="${tab}"]`);
  if(!slider||!active)return;
  slider.style.width=active.offsetWidth+'px';
  slider.style.transform=`translateX(${active.offsetLeft-3}px)`;
}

function updateActionBtns(meeting){
  const wrap=document.getElementById('actionBtns');if(!wrap)return;
  const hasBrief=!!STATE.briefs[meeting.id],isGenBrief=STATE.generating[meeting.id]==='brief';
  const hasContext=Array.isArray(STATE.transcripts[meeting.id])&&STATE.transcripts[meeting.id].length>0;

  if(isGenBrief){
    wrap.innerHTML=`<button class="gen-btn" disabled><span class="spinner"></span> Generating…</button>`;
    return;
  }

  const seBriefBtn=hasContext?`<button class="gen-btn secondary" id="btnSEBrief" title="SE brief — demo sequence, stack, branch points">SE Brief</button>`:'';

  if(STATE.activeTab==='brief'){
    if(hasBrief){
      wrap.innerHTML=`${seBriefBtn}<button class="gen-btn secondary" id="btnRegen">↻ Regen</button><button class="gen-btn secondary" id="btnCopy">Copy</button>`;
    }else{
      wrap.innerHTML=`${seBriefBtn}<button class="gen-btn" id="btnGen">Generate Dossier</button>`;
    }
  }else if(STATE.activeTab==='dealroom'){
    wrap.innerHTML=`${seBriefBtn}<button class="gen-btn" id="btnAEBrief" title="${hasContext?'Informed AE brief built from prior call transcripts':'AE brief — gather context first for full intelligence'}">AE Brief</button>`;
  }else{
    wrap.innerHTML='';
  }

  document.getElementById('btnGen')?.addEventListener('click',()=>generateBrief(meeting));
  document.getElementById('btnRegen')?.addEventListener('click',()=>generateBrief(meeting));
  document.getElementById('btnCopy')?.addEventListener('click',copyBrief);
  document.getElementById('btnSEBrief')?.addEventListener('click',()=>generateSEBrief(meeting));
  document.getElementById('btnAEBrief')?.addEventListener('click',()=>generateBrief(meeting));
}

// ── DEAL ROOM PANE ──
function renderDealRoomPane(m){
  const pane=document.getElementById('dealroomPane');if(!pane)return;
  if(!STATE.tcChats[m.id])STATE.tcChats[m.id]=[];
  const fathomKey=localStorage.getItem('doss_fathomkey')||'';
  const transcripts=STATE.transcripts[m.id];
  const hasTranscripts=Array.isArray(transcripts)&&transcripts.length>0;
  const isGathering=!!STATE.gatheringContext[m.id];
  const isChatting=STATE.generating[m.id]==='chat';

  // Context bar
  let ctxTitle,ctxSub,ctxRight='',ctxIconHtml;
  if(!fathomKey){
    ctxIconHtml=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>`;
    ctxTitle='No Fathom key set';
    ctxSub=`Add your key in <a onclick="document.getElementById('settingsPanel').classList.add('open');document.getElementById('settingsBtn').classList.add('active');">Settings</a> to pull prior call transcripts.`;
  }else if(isGathering){
    ctxIconHtml=`<span class="spinner dark"></span>`;
    ctxTitle='Searching Fathom…';
    ctxSub='Looking for prior recordings in the last 6 months.';

  }else if(hasTranscripts){
    ctxIconHtml=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`;
    const count=transcripts.length;
    const fetchedAgo=timeAgo(STATE.contextFetchTime[m.id]);
    const callList=transcripts.map(t=>{
      const d=t.date?new Date(t.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      return`<span style="display:block;font-size:10.5px;color:var(--dk-text-secondary);line-height:1.6;">${esc(t.title||'Untitled')}${d?` <span style="color:var(--dk-text-muted)">— ${d}</span>`:''}</span>`;
    }).join('');
    ctxTitle=`${count} call${count!==1?'s':''} in context${fetchedAgo?` <span style="font-family:var(--mono);font-size:10px;color:var(--dk-text-muted);font-weight:400;margin-left:6px;">${fetchedAgo}</span>`:''}`;
    ctxSub=`${callList}<span style="display:block;margin-top:4px;font-size:10.5px;"><a onclick="clearTranscripts('${m.id}')">Clear</a> · <a onclick="gatherFathomContext(getCurrentMeetings().find(x=>x.id==='${m.id}'))">Refresh</a></span>`;
    ctxRight=`<div class="context-bar-badge">${count}</div>`;
  }else if(Array.isArray(transcripts)&&transcripts.length===0){
    ctxIconHtml=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--dk-text-muted)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>`;
    ctxTitle='No prior recordings found';
    ctxSub=`Nothing in the last 6 months. <a onclick="gatherFathomContext(getCurrentMeetings().find(x=>x.id==='${m.id}'))">Try again</a>`;
  }else{
    ctxIconHtml=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`;
    ctxTitle='Pull prior call context';
    ctxSub='Search Fathom for every recorded call with this account in the last 6 months.';
    ctxRight=`<button class="context-bar-gather" onclick="gatherFathomContext(getCurrentMeetings().find(x=>x.id==='${m.id}'))">Gather Context</button>`;
  }

  // Build messages HTML
  const msgs=STATE.tcChats[m.id]||[];
  let msgsHtml='';

  if(msgs.length===0&&!hasTranscripts){
    msgsHtml=`<div class="deal-room-empty">Gather prior call context above, then ask anything —<br>tech stack, vibes, what was quoted, objections…</div>`;
  }else if(msgs.length===0){
    msgsHtml=`<div class="deal-room-empty">Ask anything about this deal —<br>tech stack, vibes, what was quoted, objections, follow-up email…</div>`;
  }else{
    msgs.forEach(msg=>{
      if(msg.role==='user'){
        msgsHtml+=`<div class="msg-group">
          <div class="msg-user"><div class="msg-user-text">${esc(msg.content)}</div></div>
        </div>`;
      }else{
        const emailMatch=msg.content.match(/<email>([\s\S]*?)<\/email>/i);
        let bodyHtml='',extras='';
        if(emailMatch){
          const emailText=emailMatch[1].trim();
          const rest=msg.content.replace(/<email>[\s\S]*?<\/email>/i,'').trim();
          if(rest)bodyHtml=`<div class="msg-assistant-body">${markdownToHtml(rest)}</div>`;
          extras=`<div class="email-card">
            <div class="email-card-header"><span class="email-card-lbl">Follow-up Email</span><button class="email-card-copy copy-trigger" data-text="${safeAttr(emailText)}">Copy</button></div>
            <div class="email-card-body">${esc(emailText)}</div>
          </div>`;
        }else{
          bodyHtml=`<div class="msg-assistant-body">${markdownToHtml(msg.content)}</div>`;
          extras=`<button class="msg-copy-btn copy-trigger" data-text="${safeAttr(msg.content)}">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>`;
        }
        msgsHtml+=`<div class="msg-group">
          <div class="msg-assistant">
            <div class="msg-assistant-header"><div class="msg-avatar">D</div><span class="msg-avatar-label">Doss</span></div>
            ${bodyHtml}${extras}
          </div>
        </div>`;
      }
    });
  }

  if(isChatting){
    msgsHtml+=`<div class="msg-group"><div class="msg-assistant"><div class="msg-assistant-header"><div class="msg-avatar">D</div><span class="msg-avatar-label">Doss</span></div><div class="msg-thinking">Thinking…</div></div></div>`;
  }

  pane.innerHTML=`<div class="deal-room">
    <div class="context-bar">
      <div class="context-bar-icon">${ctxIconHtml}</div>
      <div class="context-bar-text">
        <div class="context-bar-title">${ctxTitle}</div>
        <div class="context-bar-sub">${ctxSub}</div>
      </div>
      ${ctxRight}
    </div>
    <div class="deal-room-msgs" id="tcMsgs">${msgsHtml}</div>
    <div class="deal-room-input">
      <textarea class="tc-input" id="tcInput" placeholder="What's their tech stack? What did I quote them? Write me a follow-up email." rows="1"></textarea>
      <button class="tc-send" id="tcSend" ${isChatting?'disabled':''}>Ask</button>
    </div>
  </div>`;

  const tcMsgs=document.getElementById('tcMsgs');
  if(tcMsgs){
    tcMsgs.scrollTop=99999;
    tcMsgs.addEventListener('click',e=>{
      const btn=e.target.closest('.copy-trigger');if(!btn)return;
      const text=btn.dataset.text||'';
      navigator.clipboard.writeText(text).then(()=>{
        const orig=btn.textContent.trim();btn.textContent='Copied!';
        setTimeout(()=>btn.textContent=orig,1500);
      }).catch(()=>{
        const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        const orig=btn.textContent.trim();btn.textContent='Copied!';
        setTimeout(()=>btn.textContent=orig,1500);
      });
    });
  }

  const tcInput=document.getElementById('tcInput');
  const tcSend=document.getElementById('tcSend');
  if(tcInput&&tcSend){
    tcInput.addEventListener('input',()=>{tcInput.style.height='auto';tcInput.style.height=Math.min(tcInput.scrollHeight,100)+'px';});
    tcInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendDealRoomMsg(m);}});
    tcSend.addEventListener('click',()=>sendDealRoomMsg(m));
  }
}

// ── GATHER FATHOM CONTEXT ──
async function gatherFathomContext(m){
  if(!m)return;
  const fathomKey=localStorage.getItem('doss_fathomkey')||'';
  const proxyUrl=(localStorage.getItem('doss_proxyurl')||'').replace(/\/$/,'');
  if(!fathomKey){alert('Add your Fathom API key in Settings first.');return;}
  if(!proxyUrl){alert('Add your Fathom Proxy URL in Settings first.');return;}
  if(!STATE.orgDomain){alert('Calendar still loading — try again in a moment.');return;}
  const externalDomains=[...new Set(
    (m.attendees||[]).map(a=>emailDomain(a.email))
      .filter(d=>d&&d!==STATE.orgDomain&&!d.includes('resource.calendar.google.com')&&!d.includes('gmail.com'))
  )];
  if(!externalDomains.length){alert('No external attendees found for this meeting.');return;}
  console.log('Doss: gathering context for domains:',externalDomains.join(', '));
  delete STATE.transcripts[m.id];
  STATE.gatheringContext[m.id]=true;
  renderDealRoomPane(m);
  try{
    const sixMonthsAgo=new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);
    const params=new URLSearchParams({include_transcript:'true',limit:'100',created_after:sixMonthsAgo.toISOString()});
    externalDomains.forEach(d=>params.append('calendar_invitees_domains[]',d));
    const res=await fetch(`${proxyUrl}/meetings?${params}`,{
      headers:{'X-Fathom-Key':fathomKey,'Content-Type':'application/json'}
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.message||`Fathom API ${res.status}`);}
    const data=await res.json();
    const meetings=data.items||[];
    console.log(`Doss: ${meetings.length} meetings for ${externalDomains.join(', ')}`);
    meetings.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
    const rawTranscripts=meetings.map(fm=>{
      const lines=Array.isArray(fm.transcript)?fm.transcript:[];
      const grouped=[];
      lines.forEach(line=>{
        const speaker=line.speaker?.display_name||'Unknown';
        const last=grouped[grouped.length-1];
        if(last&&last.speaker===speaker){last.text+=' '+(line.text||'');}
        else{grouped.push({speaker,text:line.text||''});}
      });
      return{
        title:fm.title||fm.meeting_title||'Untitled Call',
        date:fm.created_at||null,
        transcript:grouped.filter(l=>l.text.trim()).map(l=>`${l.speaker}: ${l.text}`).join('\n'),
        id:fm.recording_id||fm.id,
      };
    });

    STATE.transcripts[m.id]=rawTranscripts;
    const pillBtn=document.querySelector('.pill-opt[data-tab="dealroom"]');
    if(pillBtn&&STATE.transcripts[m.id].length>0&&!pillBtn.querySelector('.pill-dot'))pillBtn.insertAdjacentHTML('beforeend','<span class="pill-dot"></span>');
    STATE.contextFetchTime[m.id]=Date.now();
    saveState();
  }catch(e){
    console.error('Doss: Fathom error:',e);
    alert(`Fathom error: ${e.message}`);
    STATE.transcripts[m.id]=[];
  }
  delete STATE.gatheringContext[m.id];
  renderDealRoomPane(m);
  updateActionBtns(m);
}

function clearTranscripts(id){
  delete STATE.transcripts[id];STATE.tcChats[id]=[];saveState();
  const m=getCurrentMeetings().find(x=>x.id===id);
  if(m){renderDealRoomPane(m);updateActionBtns(m);}
}

// ── DEAL ROOM CHAT ──
async function sendDealRoomMsg(m){
  const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey)return;
  const input=document.getElementById('tcInput');if(!input)return;
  const msg=input.value.trim();if(!msg)return;
  if(!STATE.tcChats[m.id])STATE.tcChats[m.id]=[];
  STATE.tcChats[m.id].push({role:'user',content:msg});
  input.value='';input.style.height='auto';
  STATE.generating[m.id]='chat';
  renderDealRoomPane(m);

  const transcripts=STATE.transcripts[m.id]||[];
  const externalAttendees=(m.attendees||[]).filter(a=>{
    const d=emailDomain(a.email);
    return d&&d!==STATE.orgDomain&&!d.includes('resource.calendar.google.com');
  });
  const prospectNames=externalAttendees.map(a=>a.name||a.email).join(', ');
  const prospectDomains=[...new Set(externalAttendees.map(a=>emailDomain(a.email)))].join(', ');
  const transcriptContext=buildTranscriptContext(transcripts,80000);

  // Static persona block — cached across all messages in this session
  const personaBlock={
    type:'text',
    text:`You are Doss — Will Kraft's deal intelligence partner for this account.

${ALEPH_CONTEXT}

WILL'S IDENTITY: Will Kraft is the AE. He appears in transcripts as "Will", "Will Kraft", or will.kraft@getaleph.com. Other Aleph people (Kristen, Jeremy, Alex, Ritvik, Tom) are his colleagues — never the prospect.

CURRENT DEAL: ${m.title}
Prospect: ${prospectNames||'Unknown'} (${prospectDomains})

WHO YOU ARE IN THIS CONTEXT:
You are not an analyst. You are not a summarizer. You are the person who was in every one of these calls and remembers everything — the tone, the hesitation, the moment someone said something with real conviction, the thing that got glossed over that actually mattered. Will can probe you on anything about this deal and you respond like a sharp colleague who was in the room, not like a tool returning data.

You hold complexity. When something is competitive, you don't just flag "competitor risk" — you surface what was actually said, how it was said, what it probably means about where their head is. When something is a concern, you describe the shape of that concern as the person expressed it, not the category it falls into. You never collapse nuance into a label.

You know your place in Will's world. He is running this deal. You are supporting it. When he probes for intelligence, you give him a real read — fluid, specific, grounded in what actually happened. When he asks you to execute, you execute. You read what he needs from how he's asking, not from explicit instructions.

HOW TO RESPOND TO INTELLIGENCE QUESTIONS:
Surface what is tactically load-bearing right now — not everything you know, the things that actually matter to a human being in this specific deal at this specific moment. Ground everything in what was actually said. Preserve the texture of how it was said. A moment of conviction from the prospect is different from something they mentioned in passing — treat them differently. Never recap things Will already lived through. He was there.

HOW TO WRITE FOLLOW-UP EMAILS:
Will's approach: find what the person is actually afraid of underneath what they said — not the stated concern, the real one. Make the next step feel inevitable and easy from their perspective. Be direct. Directness is a gift — it removes the ambiguity that lets people stall. Leave no room for questions because questions create distance. The email should feel like clarity, not pressure.

Never open with what just happened — they lived it too. Anchor on one real moment or signal from the conversation that reveals something true about where they are. Let that do the work. Then make the next step obvious.

Never use: "It was great connecting", "I wanted to follow up", "Just checking in", "Let me know if you have questions", "circle back", "touch base", "reach out", "seamless", "excited to", em dashes, bullet points, formal sign-offs. Don't mention Aleph by name in the first sentence. Don't write something that sounds like it came from a template.

Wrap the email body ONLY in <email></email> tags. No subject line. No greeting label. First word of the email, nothing before it.`,
    cache_control:{type:'ephemeral'}
  };

  // Transcript block — static for this deal session, cached separately
  const transcriptBlock={
    type:'text',
    text:transcripts.length>0
      ?`PRIOR CALL TRANSCRIPTS (${transcripts.length} calls, newest first):\n${transcriptContext}`
      :'No prior call transcripts loaded.',
    cache_control:{type:'ephemeral'}
  };

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-beta':'prompt-caching-2024-07-31',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:STATE.model,
        max_tokens:2000,
        system:[personaBlock,transcriptBlock],
        messages:STATE.tcChats[m.id].map(x=>({role:x.role,content:x.content}))
      })});
    const data=await res.json();
    if(data.error){
      const msg=data.error.type==='rate_limit_error'
        ?'Rate limit hit — wait a moment and try again.'
        :`API error: ${data.error.message}`;
      STATE.tcChats[m.id].push({role:'assistant',content:msg});
    }else{
      const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      STATE.tcChats[m.id].push({role:'assistant',content:reply||'No response — try again.'});
    }
    saveState();
  }catch(e){
    console.error(e);
    STATE.tcChats[m.id].push({role:'assistant',content:'Something went wrong. Check your connection and API key.'});
  }
  delete STATE.generating[m.id];
  renderDealRoomPane(m);
}

// ── TOC ──
function buildToc(){
  const paper=document.getElementById('briefPaper')||document.getElementById('streamTarget');
  const tocCol=document.getElementById('briefTocCol');if(!paper||!tocCol)return;
  const headings=paper.querySelectorAll('h2');if(headings.length===0)return;
  headings.forEach((h,i)=>{h.id=`s${i}`;});

// ── TRANSCRIPT CONTEXT BUILDER ──
// Packs as many recent transcripts as fit within a character budget.
// Each transcript gets an equal share, but no call is dropped in favor of
// giving one call the entire budget. Recent calls always come first.
function buildTranscriptContext(transcripts, charBudget){
  if(!transcripts||!transcripts.length)return'';
  const perBudget=Math.floor(charBudget/transcripts.length);
  const parts=[];let remaining=charBudget;
  for(let i=0;i<transcripts.length;i++){
    if(remaining<500)break;
    const t=transcripts[i];
    const date=t.date?new Date(t.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    const header=`=== ${i===0?'[MOST RECENT]':'[PRIOR]'} ${t.title}${date?' — '+date:''} ===\n`;
    const alloc=Math.min(perBudget,remaining-header.length);
    if(alloc<200)break;
    const body=t.transcript.length>alloc?t.transcript.slice(0,alloc)+'…[truncated]':t.transcript;
    parts.push(header+body);
    remaining-=(header.length+body.length+15);
  }
  return parts.join('\n\n---\n\n');
}

Every deal hinges on one question before anything else.

- Platform-first (Abacum, Anaplan, Adaptive, Pigment): Finance moves into a new tool. Logic lives in the platform. Structure and governance built in.

- Risk-averse buyer at a big company who needs enterprise brand credibility → Workday/Adaptive wins on trust

We lose: Price — Cube goes to $12–15K, which we don't match. Simplicity — less sophisticated teams find Cube cleaner and easier. Perceived maturity — better docs, been around longer, feels safer.

function getBriefPrompt(meetingId){
  const custom=STATE.briefTemplate.trim();
  const transcripts=STATE.transcripts[meetingId];
  const hasPrior=Array.isArray(transcripts)&&transcripts.length>0;
  // When prior transcripts exist and no custom template, use the informed brief prompt
  let base=custom
    ?`You are Doss, a sales intelligence tool for an AE at Aleph.\n${ALEPH_CONTEXT}\n\nBuild a pre-call brief following these instructions. Research deeply. Be specific. No filler. Markdown.\n\n{{PRIOR_CALL_CONTEXT}}\n\nINSTRUCTIONS:\n${custom}`
    :(hasPrior?INFORMED_BRIEF_PROMPT:DEFAULT_BRIEF_PROMPT);
  if(hasPrior){
    const ctx=buildTranscriptContext(transcripts,40000);
    base=base.replace('{{PRIOR_CALL_CONTEXT}}',`PRIOR CALL TRANSCRIPTS — PRIMARY INTELLIGENCE SOURCE. Weight everything here above public research.\n\n${ctx}\n\nUse web research only to fill gaps the transcripts don't cover.`);

  }

}

async function generateBrief(m){

  if(STATE.activeTab!=='brief'){

  }

  const org=STATE.orgDomain||'';
  const ext=(m.attendees||[]).filter(a=>{const d=emailDomain(a.email);return d&&d!==org&&!d.includes('resource.calendar.google.com');});
  const intNames=(m.attendees||[]).filter(a=>emailDomain(a.email)===org).map(a=>a.name||a.email).join(', ');
  const attInfo=ext.map(a=>`- Name: ${a.name||'Unknown'} | Email: ${a.email||''} | Domain: ${emailDomain(a.email)}`).join('\n')||'- No external attendee details';
  const hasPriorCalls=Array.isArray(STATE.transcripts[m.id])&&STATE.transcripts[m.id].length>0;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:STATE.model,max_tokens:4000,stream:true,system:getBriefPrompt(m.id),
        messages:[{role:'user',content:`Build a dossier. ONLY research EXTERNAL attendees. Do NOT mention anyone from my company (${org||'my company'}).\n\nMeeting: ${m.title}\nTime: ${formatTimeRange(m.startTime,m.endTime)} ${getTzAbbr()}\n${m.location?'Location: '+m.location:''}\n\nEXTERNAL ATTENDEES:\n${attInfo}\n\n${intNames?'Internal (SKIP): '+intNames:''}\n\n${hasPriorCalls?'NOTE: Prior call transcripts are in the system prompt. Lead with what was uncovered in those calls before supplementing with web research.':''}`}],
        tools:[{type:'web_search_20250305',name:'web_search'}]})});
    const ct=res.headers.get('content-type')||'';
    if(!res.ok||!ct.includes('text/event-stream')){
      const data=await res.json();if(data.error)throw new Error(data.error.message);
      const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n\n');
      STATE.briefs[m.id]=text?markdownToHtml(text):'<p style="color:var(--text-muted)">No content returned.</p>';
    }else{
      const reader=res.body.getReader(),decoder=new TextDecoder();
      let rawText='',buffer='',blockType=null,blockName=null,toolBuf='';
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buffer+=decoder.decode(value,{stream:true});
        const lines=buffer.split('\n');buffer=lines.pop()||'';
        for(const line of lines){
          if(!line.startsWith('data: '))continue;
          const js=line.slice(6).trim();if(js==='[DONE]')continue;
          try{
            const ev=JSON.parse(js);
            if(ev.type==='content_block_start'){blockType=ev.content_block?.type;blockName=ev.content_block?.name||null;toolBuf='';}
            if(ev.type==='content_block_stop'){blockType=null;blockName=null;}
            if(ev.type==='content_block_delta'&&blockType==='tool_use'&&blockName==='web_search'){
              toolBuf+=(ev.delta?.partial_json||'');
              const q=toolBuf.match(/"query"\s*:\s*"([^"\\]*)/);
              if(q){const el=document.getElementById('searchStatusText');if(el)el.textContent=`Searching: ${q[1]}…`;}
            }
            if(ev.type==='content_block_delta'&&ev.delta?.type==='text_delta'){
              rawText+=ev.delta.text;STATE.briefs[m.id]=markdownToHtml(rawText);
              const t=document.getElementById('streamTarget');if(t){t.innerHTML=STATE.briefs[m.id];buildToc();}
              if(rawText.length>80){const ss=document.getElementById('searchStatus');if(ss)ss.classList.add('faded');}
            }
            if(ev.type==='error')throw new Error(ev.error?.message||'Stream error');
          }catch(pe){if(pe.message!=='Stream error')continue;throw pe;}
        }
      }
      if(rawText)STATE.briefs[m.id]=markdownToHtml(rawText);
      else if(!STATE.briefs[m.id])STATE.briefs[m.id]='<p style="color:var(--text-muted)">Try regenerating.</p>';
    }
  }catch(e){console.error(e);STATE.briefs[m.id]=`<p style="color:var(--red)">Error: ${e.message}</p>`;}
  delete STATE.generating[m.id];saveState();renderMeetingList();renderBriefPane(m);updateActionBtns(m);
}

    }
  }catch(e){console.error(e);STATE.briefs[m.id]=`<p style="color:var(--red)">Error: ${e.message}</p>`;}
  delete STATE.generating[m.id];saveState();renderMeetingList();renderBriefPane(m);updateActionBtns(m);
}

// ── DAY NAV ──
async function navigateDay(offset){
  STATE.currentDate.setDate(STATE.currentDate.getDate()+offset);STATE.activeMeetingId=null;updateDateBar();
  const key=dateKey(STATE.currentDate);
  if(STATE.dayCache[key])renderMeetingList();else if(STATE.accessToken)await loadCurrentDay();else renderMeetingList();
  document.getElementById('mainPanel').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>Select a meeting</h3><p>Click a meeting to generate a dossier.</p></div>`;
}

// ── UTILS ──
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeAttr(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/\n/g,'&#10;').replace(/\r/g,'&#13;');}
function timeAgo(ts){if(!ts)return'';const mins=Math.floor((Date.now()-ts)/60000);if(mins<1)return'just now';if(mins<60)return`${mins}m ago`;const hrs=Math.floor(mins/60);if(hrs<24)return`${hrs}h ago`;return`${Math.floor(hrs/24)}d ago`;}

function markdownToHtml(t){
  if(!t)return'';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^(?!<[hup]|<li|<ul|<\/ul|<br)(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'').replace(/<p><br><\/p>/g,'');
}
