<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doss — Daily Dossier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream-50:#f0ebe2;--cream-100:#eae4d8;--cream-150:#e4ddd0;--cream-200:#dbd3c4;--cream-300:#ccc2b0;
  --cream-400:#b5a894;--cream-500:#978a78;--cream-600:#786c5e;--cream-700:#564c42;--cream-800:#3a332c;--cream-900:#1e1a16;
  --accent:#b5703a;--accent-warm:#c4824e;--accent-light:#daa878;--accent-bg:rgba(181,112,58,0.10);--accent-border:rgba(181,112,58,0.22);
  --green:#5a8c66;--green-bg:rgba(90,140,102,0.10);--green-border:rgba(90,140,102,0.24);
  --yellow:#c49520;--red:#b05a3a;
  --bg:#e6dfd4;--surface:#eee8dc;--surface-warm:#eae4d8;--border:#d4cab8;--border-subtle:#dbd3c4;
  --text:#2c2520;--text-secondary:#6b6058;--text-muted:#9c9080;
  --paper:#f5f0e8;--paper-border:#cec6b6;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif;--serif:'DM Serif Display',Georgia,serif;
  --radius:8px;--radius-lg:12px;
  --shadow-sm:0 1px 3px rgba(44,37,32,0.07);
  --shadow:0 2px 8px rgba(44,37,32,0.09),0 1px 3px rgba(44,37,32,0.05);
  --shadow-lg:0 8px 28px rgba(44,37,32,0.12),0 2px 8px rgba(44,37,32,0.06);
  --shadow-glow:0 0 0 1px rgba(181,112,58,0.10),0 2px 12px rgba(181,112,58,0.08);
  --paper-shadow:0 1px 2px rgba(44,37,32,0.06),0 4px 16px rgba(44,37,32,0.10),0 12px 40px rgba(44,37,32,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;
  background-image:linear-gradient(rgba(181,112,58,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(181,112,58,0.018) 1px,transparent 1px);background-size:28px 28px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:308px;min-width:308px;background:var(--surface-warm);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:18px 18px 0;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.logo-text{font-size:21px;font-weight:700;letter-spacing:-0.8px;color:var(--cream-900);}
.logo-sub{font-size:10px;color:var(--text-muted);font-weight:400;letter-spacing:0.5px;text-transform:uppercase;}
.settings-toggle{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s;margin-left:auto;}
.settings-toggle:hover{background:var(--cream-150);color:var(--text);}
.settings-toggle.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}



/* AUTH */
.auth-bar{margin:10px 18px 0;}
.google-btn{width:100%;padding:8px 11px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;justify-content:center;}
.google-btn:hover{background:var(--cream-150);border-color:var(--cream-400);}
.google-btn.signed-in{background:var(--green-bg);border-color:var(--green-border);color:var(--green);cursor:default;}

/* SETTINGS */
.settings-panel{display:none;padding:14px 18px;border-top:1px solid var(--border-subtle);flex-shrink:0;max-height:46vh;overflow-y:auto;}
.settings-panel.open{display:block;}
.settings-panel label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:5px;}
.settings-panel label:not(:first-child){margin-top:14px;}
.api-bar{padding:9px 11px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--radius);display:flex;align-items:center;gap:8px;}
.api-bar.connected{background:var(--green-bg);border-color:var(--green-border);}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.api-bar.connected .api-dot{background:var(--green);}
.api-bar label{font-size:10px!important;font-weight:500!important;color:var(--text-secondary)!important;text-transform:uppercase!important;letter-spacing:0.5px!important;flex-shrink:0;margin:0!important;}
.api-input{flex:1;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;}
.api-input::placeholder{color:var(--text-muted);}
.settings-textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:12px;color:var(--text);background:var(--surface);outline:none;resize:vertical;min-height:90px;line-height:1.5;transition:border-color 0.15s;}
.settings-textarea:focus{border-color:var(--cream-400);}
.settings-textarea::placeholder{color:var(--text-muted);}
.settings-hint{font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.4;}
.save-indicator{display:inline-block;font-size:11px;color:var(--green);font-weight:500;margin-left:8px;opacity:0;transition:opacity 0.3s;}
.save-indicator.show{opacity:1;}

/* DATE + MEETINGS */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;}
.date-label{font-weight:600;font-size:14px;color:var(--text);}
.date-sub{font-size:11px;color:var(--text-muted);}
.day-nav{display:flex;gap:4px;}
.day-nav button{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.15s;}
.day-nav button:hover{background:var(--cream-150);color:var(--text);}
.meeting-list-header{padding:6px 18px;display:flex;align-items:center;justify-content:space-between;}
.meeting-list-header span{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);font-weight:600;}
.meeting-count{font-family:var(--mono);font-size:10.5px;color:var(--text-muted);}
.meeting-list{flex:1;overflow-y:auto;padding:0 10px 10px;}
.meeting-list::-webkit-scrollbar{width:4px;}
.meeting-list::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}
.meeting-card{padding:11px 12px;border-radius:var(--radius);cursor:pointer;transition:all 0.2s;border:1px solid transparent;margin-bottom:3px;}
.meeting-card:hover{background:var(--cream-150);border-color:var(--border-subtle);}
.meeting-card.active{background:var(--surface);border-color:var(--accent-border);box-shadow:var(--shadow-glow);}
.meeting-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px;}
.meeting-time{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:500;}
.meeting-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.status-none{background:var(--cream-300);}
.status-ready{background:#6b9c77;box-shadow:0 0 5px rgba(90,140,102,0.3);}
.status-generating{background:var(--yellow);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.meeting-name{font-weight:600;font-size:13px;color:var(--text);margin-bottom:1px;line-height:1.3;}
.meeting-meta{font-size:11.5px;color:var(--text-muted);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);
  background-image:linear-gradient(rgba(180,160,130,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,130,0.05) 1px,transparent 1px);background-size:24px 24px;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:10px;padding:40px;}
.empty-icon{width:44px;height:44px;background:var(--cream-200);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.empty-state h3{font-size:15px;font-weight:600;color:var(--text-secondary);}
.empty-state p{font-size:13px;text-align:center;max-width:300px;line-height:1.6;}

/* DETAIL HEADER */
.detail-header{padding:16px 22px;border-bottom:1px solid var(--border-subtle);background:var(--surface);flex-shrink:0;}
.detail-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;gap:12px;}
.detail-title{font-size:18px;font-weight:700;letter-spacing:-0.4px;color:var(--text);}
.detail-time{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 9px;border-radius:5px;flex-shrink:0;}
.detail-attendees{font-size:12px;color:var(--text-secondary);}

/* ACTION BAR — replaces tab-bar + brief-toolbar */
.action-bar{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.pill-toggle{display:inline-flex;background:var(--cream-150);border:1px solid var(--border-subtle);border-radius:20px;padding:3px;gap:2px;}
.pill-opt{padding:5px 16px;border-radius:16px;border:none;background:transparent;font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.18s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.pill-opt.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(44,37,32,0.10);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.action-btns{display:flex;gap:6px;}
.gen-btn{padding:7px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:7px;box-shadow:0 1px 4px rgba(181,112,58,0.2);}
.gen-btn:hover{background:var(--accent-warm);}
.gen-btn:disabled{background:var(--cream-300);box-shadow:none;cursor:not-allowed;}
.gen-btn.secondary{background:var(--cream-150);color:var(--text-secondary);border:1px solid var(--border);box-shadow:none;}
.gen-btn.secondary:hover{background:var(--cream-200);color:var(--text);}

/* TAB CONTENT */
.tab-content{flex:1;overflow-y:auto;padding:20px 22px;}
.tab-content::-webkit-scrollbar{width:4px;}
.tab-content::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}
.tab-content.brief-mode{overflow:hidden;padding:0;display:flex;flex-direction:column;}

/* BRIEF TWO-PANE */
.brief-layout{flex:1;display:flex;overflow:hidden;}

/* TOC */
.brief-toc-col{width:168px;min-width:168px;overflow-y:auto;padding:18px 10px 18px 14px;border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:1px;background:var(--surface-warm);}
.brief-toc-col::-webkit-scrollbar{width:3px;}
.brief-toc-col::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}
.toc-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);padding:0 7px 6px;border-bottom:1px solid var(--border-subtle);margin-bottom:4px;}
.toc-item{display:block;font-size:11.5px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:5px 7px;border-radius:4px;line-height:1.35;transition:all 0.12s;cursor:pointer;border-left:2px solid transparent;}
.toc-item:hover{color:var(--text-secondary);background:var(--cream-150);}
.toc-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-bg);font-weight:600;}
.toc-skeleton{padding:5px 7px;display:flex;flex-direction:column;gap:7px;}
.toc-skel{height:10px;background:var(--cream-200);border-radius:3px;animation:shimmer 1.5s infinite;}
.toc-skel:nth-child(2){width:75%;}
.toc-skel:nth-child(3){width:85%;}
.toc-skel:nth-child(4){width:60%;}
.toc-skel:nth-child(5){width:80%;}
.toc-skel:nth-child(6){width:70%;}
.toc-skel:nth-child(7){width:55%;}
@keyframes shimmer{0%,100%{opacity:0.45}50%{opacity:0.9}}

/* PAPER SCROLL AREA */
.brief-paper-col{flex:1;overflow-y:auto;padding:28px 32px 48px;display:flex;flex-direction:column;gap:0;}
.brief-paper-col::-webkit-scrollbar{width:4px;}
.brief-paper-col::-webkit-scrollbar-thumb{background:var(--cream-300);border-radius:2px;}

/* SEARCH STATUS */
.search-status{font-family:var(--mono);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:9px;padding:0 0 14px;min-height:34px;transition:opacity 0.4s;}
.search-status.faded{opacity:0.35;}

/* THE PAPER */
.brief-paper{
  background:var(--paper);
  border:1px solid var(--paper-border);
  border-left:3px solid rgba(181,112,58,0.22);
  border-radius:2px;
  box-shadow:var(--paper-shadow);
  padding:40px 48px 40px 52px;
  position:relative;
}
.brief-paper::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(transparent,transparent 27px,rgba(181,112,58,0.04) 27px,rgba(181,112,58,0.04) 28px);
  pointer-events:none;border-radius:2px;
}

/* PAPER TYPOGRAPHY */
.brief-paper h1{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--cream-900);letter-spacing:-0.2px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--paper-border);line-height:1.25;}
.brief-paper h2{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--accent);margin-top:28px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(181,112,58,0.18);scroll-margin-top:16px;}
.brief-paper h2:first-of-type{margin-top:0;}
.brief-paper h3{font-size:12px;font-weight:600;color:var(--text-secondary);margin-top:12px;margin-bottom:3px;font-style:italic;}
.brief-paper p{font-size:13.5px;line-height:1.68;margin-bottom:7px;color:var(--text);}
.brief-paper p:last-child{margin-bottom:0;}
.brief-paper ul{margin:4px 0 8px 0;list-style:none;}
.brief-paper ul li{font-size:13.5px;line-height:1.65;margin-bottom:4px;padding-left:16px;color:var(--text);position:relative;}
.brief-paper ul li::before{content:'—';position:absolute;left:0;color:var(--cream-400);font-size:12px;line-height:1.65;}
.brief-paper ol{margin:4px 0 8px 14px;}
.brief-paper ol li{font-size:13.5px;line-height:1.65;margin-bottom:4px;color:var(--text);}
.brief-paper strong{font-weight:600;color:var(--cream-900);}
.brief-paper em{color:var(--text-secondary);}
.brief-paper code{font-family:var(--mono);font-size:11.5px;background:var(--cream-200);padding:1px 5px;border-radius:2px;color:var(--accent);}

/* BRIEF EMPTY */
.brief-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:60px 40px;color:var(--text-muted);}
.brief-empty-icon{width:52px;height:52px;background:var(--cream-200);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;}
.brief-empty h4{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;}
.brief-empty p{font-size:13px;line-height:1.5;max-width:300px;}

/* SPINNER */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner.dark{border-color:var(--cream-300);border-top-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}

/* DEBRIEF */
.debrief-section{margin-bottom:16px;}
.debrief-section label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:7px;}
.debrief-textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;resize:vertical;min-height:130px;line-height:1.6;transition:border-color 0.15s;}
.debrief-textarea:focus{border-color:var(--cream-400);}
.debrief-textarea::placeholder{color:var(--text-muted);}
.debrief-output{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-top:14px;}
.debrief-output h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:9px;text-transform:uppercase;letter-spacing:0.5px;}
.copy-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:11.5px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;}
.copy-btn:hover{background:var(--cream-150);color:var(--text);}
.gen-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--text-secondary);}
.gen-overlay .spinner.dark{width:22px;height:22px;border-width:3px;}
.gen-overlay p{font-size:13px;}
.brief-content{line-height:1.68;}
.brief-content h1{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px;}
.brief-content h2{font-size:13px;font-weight:700;margin-top:18px;margin-bottom:7px;color:var(--accent);}
.brief-content h3{font-size:12px;font-weight:600;margin-top:12px;margin-bottom:3px;color:var(--text-secondary);}
.brief-content p{margin-bottom:8px;font-size:13px;}
.brief-content ul{margin-left:18px;margin-bottom:8px;}
.brief-content li{margin-bottom:3px;font-size:13px;}
.brief-content strong{font-weight:600;}
.brief-content code{font-family:var(--mono);font-size:11.5px;background:var(--cream-150);padding:1px 5px;border-radius:3px;color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#342e26,#1e1a14);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(30,26,20,0.3);position:relative;overflow:hidden;flex-shrink:0;">
          <svg viewBox="0 0 36 36" width="36" height="36" style="position:absolute;top:0;left:0;" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="11" fill="none" stroke="#b5703a" stroke-width="0.5" opacity="0.2"/>
            <circle cx="18" cy="18" r="6.5" fill="none" stroke="#b5703a" stroke-width="0.4" opacity="0.15"/>
            <line x1="18" y1="4" x2="18" y2="32" stroke="#b5703a" stroke-width="0.3" opacity="0.1"/>
            <line x1="4" y1="18" x2="32" y2="18" stroke="#b5703a" stroke-width="0.3" opacity="0.1"/>
          </svg>
          <span style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:17px;color:#b5703a;letter-spacing:-1px;position:relative;z-index:1;">D</span>
        </div>
        <div>
          <div class="logo-text">Doss</div>
          <div class="logo-sub">Daily Dossier</div>
        </div>
        <button class="settings-toggle" id="settingsBtn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>



    <div class="auth-bar">
      <button class="google-btn" id="googleBtn" onclick="handleGoogleAuth()">

const GOOGLE_CLIENT_ID='545043452179-k57aahlhjd5o8u2h8ehpsoftvi1ian8r.apps.googleusercontent.com';

// ── CALENDAR ──
async function fetchCalendarEvents(date){
  if(!STATE.accessToken)return[];
  const s=new Date(date);s.setHours(0,0,0,0);
  const e=new Date(date);e.setHours(23,59,59,999);
  const params=new URLSearchParams({timeMin:s.toISOString(),timeMax:e.toISOString(),singleEvents:'true',orderBy:'startTime',maxResults:'50',timeZone:STATE.timezone});
  try{
    const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,{headers:{Authorization:`Bearer ${STATE.accessToken}`}});
    if(res.status===401){
      STATE.accessToken=null;localStorage.removeItem('doss_gtoken');
      const btn=document.getElementById('googleBtn');btn.classList.remove('signed-in');
      btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google';
      if(tokenClient)tokenClient.requestAccessToken({prompt:''});return[];
    }
    const data=await res.json();
    return(data.items||[]).map(ev=>({id:ev.id,title:ev.summary||'Untitled',startTime:ev.start?.dateTime||ev.start?.date,endTime:ev.end?.dateTime||ev.end?.date,attendees:(ev.attendees||[]).map(a=>({name:a.displayName||a.email,email:a.email})),location:ev.location||null}));
  }catch(err){console.error('Calendar fetch error:',err);return[];}
}

// ── FILTERING ──
function emailDomain(email){if(!email||!email.includes('@'))return'';return email.split('@')[1].toLowerCase();}
function detectOrgDomain(events){
  const counts={};
  events.forEach(ev=>{(ev.attendees||[]).forEach(a=>{const d=emailDomain(a.email);if(d&&!d.includes('gmail.com')&&!d.includes('googlemail.com')&&!d.includes('resource.calendar.google.com'))counts[d]=(counts[d]||0)+1;});});
  let best='',max=0;Object.entries(counts).forEach(([d,c])=>{if(c>max){best=d;max=c;}});return best;
}
function isExternal(meeting,orgDomain){
  const att=meeting.attendees||[];if(att.length<=1)return false;if(!orgDomain)return true;
  return att.some(a=>{const d=emailDomain(a.email);return d&&d!==orgDomain&&!d.includes('resource.calendar.google.com');});
}

// ── LOAD & CACHE ──
async function loadDay(date){
  const key=dateKey(date);if(STATE.dayCache[key])return STATE.dayCache[key];
  const allEvents=await fetchCalendarEvents(date);
  if(!STATE.orgDomain&&allEvents.length>0)STATE.orgDomain=detectOrgDomain(allEvents);
  const external=allEvents.filter(m=>isExternal(m,STATE.orgDomain));
  external.sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  STATE.dayCache[key]=external;return external;
}
async function loadCurrentDay(){
  const list=document.getElementById('meetingList');
  list.innerHTML='<div style="padding:18px;text-align:center;color:var(--text-muted);font-size:13px;"><div class="spinner dark" style="margin:0 auto 8px;"></div>Loading…</div>';
  await loadDay(STATE.currentDate);renderMeetingList();updateDateBar();
}
async function backgroundLoadWeek(){
  const dow=STATE.currentDate.getDay();
  const monday=new Date(STATE.currentDate);monday.setDate(STATE.currentDate.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:5},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;}).filter(d=>!STATE.dayCache[dateKey(d)]);
  await Promise.all(days.map(async d=>{await loadDay(d);if(dateKey(STATE.currentDate)===dateKey(d))renderMeetingList();}));
}
function getCurrentMeetings(){return STATE.dayCache[dateKey(STATE.currentDate)]||[];}
function dateKey(date){return new Intl.DateTimeFormat('en-CA',{timeZone:STATE.timezone,year:'numeric',month:'2-digit',day:'2-digit'}).format(date);}



// ── DATE ──
function formatDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:STATE.timezone});}
function formatDateShort(d){return d.toLocaleDateString('en-US',{year:'numeric',timeZone:STATE.timezone});}
function formatTime(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:STATE.timezone});}
function formatTimeRange(s,e){return`${formatTime(s)} – ${formatTime(e)}`;}
function getTzAbbr(){try{return new Intl.DateTimeFormat('en-US',{timeZone:STATE.timezone,timeZoneName:'short'}).formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||STATE.timezone;}catch{return STATE.timezone;}}
function updateDateBar(){document.getElementById('dateLabel').textContent=formatDate(STATE.currentDate);document.getElementById('dateSub').textContent=formatDateShort(STATE.currentDate);}

function renderMeetingList(){

      <div class="pill-toggle">
        <button class="pill-opt ${STATE.activeTab==='brief'?'active':''}" data-tab="brief">Brief${hasBrief?'<span class="pill-dot"></span>':''}</button>
        <button class="pill-opt ${STATE.activeTab==='debrief'?'active':''}" data-tab="debrief">Debrief${hasDebriefOut?'<span class="pill-dot"></span>':''}</button>

function renderBriefTab(c,m,has,gen){
  c.classList.add('brief-mode');
  if(gen){
    c.innerHTML=`<div class="brief-layout">
      <nav class="brief-toc-col" id="briefTocCol"><div class="toc-label">Sections</div><div class="toc-skeleton">${'<div class="toc-skel"></div>'.repeat(7)}</div></nav>

      </div></div>`;
    return;
  }
  c.innerHTML=`<div class="brief-layout">

      ?`<div class="brief-paper" id="briefPaper">${STATE.briefs[m.id]}</div>`
      :`<div class="brief-empty"><div class="brief-empty-icon">🎯</div><h4>No dossier yet</h4><p>Hit Generate to research attendees and build your pre-call brief.</p></div>`
    }</div></div>`;
  if(has)requestAnimationFrame(buildToc);
}

// ── TOC ──
function buildToc(){
  const paper=document.getElementById('briefPaper')||document.getElementById('streamTarget');
  const tocCol=document.getElementById('briefTocCol');
  if(!paper||!tocCol)return;
  const headings=paper.querySelectorAll('h2');
  if(headings.length===0)return;
  headings.forEach((h,i)=>{h.id=`s${i}`;});
  tocCol.innerHTML=`<div class="toc-label">Sections</div>${Array.from(headings).map((h,i)=>`<a class="toc-item" data-target="s${i}">${h.textContent}</a>`).join('')}`;
  const scrollCol=paper.closest('.brief-paper-col');
  tocCol.querySelectorAll('.toc-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const target=document.getElementById(item.dataset.target);
      if(target&&scrollCol)scrollCol.scrollTo({top:target.offsetTop-20,behavior:'smooth'});
    });
  });
  if(!scrollCol)return;
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        tocCol.querySelectorAll('.toc-item').forEach(t=>t.classList.remove('active'));
        const active=tocCol.querySelector(`[data-target="${entry.target.id}"]`);
        if(active)active.classList.add('active');
      }
    });
  },{root:scrollCol,threshold:0,rootMargin:'0px 0px -75% 0px'});
  headings.forEach(h=>observer.observe(h));
  const first=tocCol.querySelector('.toc-item');if(first)first.classList.add('active');
}

// ── GENERATE BRIEF ──
async function generateBrief(m){
  const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey){alert('Enter your Anthropic API key in Settings.');return;}
  STATE.generating[m.id]='brief';STATE.briefs[m.id]='';renderMeetingList();renderDetail();
  const orgDomain=STATE.orgDomain||'';
  const externalAttendees=(m.attendees||[]).filter(a=>{const d=a.email?.includes('@')?a.email.split('@')[1].toLowerCase():'';return d&&d!==orgDomain&&!d.includes('resource.calendar.google.com');});
  const internalNames=(m.attendees||[]).filter(a=>{const d=a.email?.includes('@')?a.email.split('@')[1].toLowerCase():'';return d===orgDomain;}).map(a=>a.name||a.email).join(', ');
  const attendeeInfo=externalAttendees.map(a=>`- Name: ${a.name||'Unknown'} | Email: ${a.email||''} | Company domain: ${a.email?.includes('@')?a.email.split('@')[1]:''}`).join('\n')||'- No external attendee details available';

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:STATE.model,max_tokens:4000,stream:true,system:getBriefSystemPrompt(),
        messages:[{role:'user',content:`Build a dossier for this meeting. ONLY research the EXTERNAL attendees listed below. Do NOT research or mention anyone from my company (${orgDomain||'my company'}).\n\nMeeting: ${m.title}\nTime: ${formatTimeRange(m.startTime,m.endTime)} ${getTzAbbr()}\n${m.location?'Location: '+m.location:''}\n\nEXTERNAL ATTENDEES (research these people):\n${attendeeInfo}\n\n${internalNames?'Internal team joining (SKIP these): '+internalNames:''}\n\nResearch each external attendee and their company thoroughly.`}],
        tools:[{type:'web_search_20250305',name:'web_search'}]})
    });

    const contentType=res.headers.get('content-type')||'';
    if(!res.ok||!contentType.includes('text/event-stream')){
      const data=await res.json();if(data.error)throw new Error(data.error.message||'API error');
      const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n\n');
      STATE.briefs[m.id]=text?markdownToHtml(text):'<p style="color:var(--text-muted)">No content returned. Try again.</p>';
    }else{
      const reader=res.body.getReader(),decoder=new TextDecoder();
      let rawText='',buffer='';
      let currentBlockType=null,currentBlockName=null,toolInputBuf='';

      while(true){
        const{done,value}=await reader.read();if(done)break;
        buffer+=decoder.decode(value,{stream:true});
        const lines=buffer.split('\n');buffer=lines.pop()||'';

        for(const line of lines){
          if(!line.startsWith('data: '))continue;
          const jsonStr=line.slice(6).trim();if(jsonStr==='[DONE]')continue;
          try{
            const event=JSON.parse(jsonStr);

            // Track block types for search feedback
            if(event.type==='content_block_start'){
              const blk=event.content_block;
              currentBlockType=blk?.type;
              currentBlockName=blk?.name||null;
              toolInputBuf='';
            }
            if(event.type==='content_block_stop'){
              currentBlockType=null;currentBlockName=null;toolInputBuf='';
            }

            // Show what we're searching for
            if(event.type==='content_block_delta'&&currentBlockType==='tool_use'&&currentBlockName==='web_search'){
              toolInputBuf+=(event.delta?.partial_json||'');
              const qMatch=toolInputBuf.match(/"query"\s*:\s*"([^"\\]*)/);
              if(qMatch){
                const stEl=document.getElementById('searchStatusText');
                if(stEl)stEl.textContent=`Searching: ${qMatch[1]}…`;
              }
            }

            // Stream text content
            if(event.type==='content_block_delta'&&event.delta?.type==='text_delta'){
              rawText+=event.delta.text;
              STATE.briefs[m.id]=markdownToHtml(rawText);
              const target=document.getElementById('streamTarget');
              if(target){target.innerHTML=STATE.briefs[m.id];buildToc();}
              // Fade status once text is flowing
              if(rawText.length>80){const ss=document.getElementById('searchStatus');if(ss)ss.classList.add('faded');}
            }

            if(event.type==='error')throw new Error(event.error?.message||'Stream error');
          }catch(parseErr){if(parseErr.message&&parseErr.message!=='Stream error')continue;throw parseErr;}
        }
      }
      if(rawText)STATE.briefs[m.id]=markdownToHtml(rawText);
      else if(!STATE.briefs[m.id])STATE.briefs[m.id]='<p style="color:var(--text-muted)">Brief generated but no text returned. Try regenerating.</p>';
    }
  }catch(e){console.error(e);STATE.briefs[m.id]='<p style="color:var(--red)">Error generating brief. Check console.</p>';}

  delete STATE.generating[m.id];saveState();renderMeetingList();renderDetail();
}

function renderDebriefTab(c,m,gen){
  if(!STATE.debriefs[m.id])STATE.debriefs[m.id]={transcript:'',output:''};
  const db=STATE.debriefs[m.id];
  if(gen){c.innerHTML=`<div class="gen-overlay"><div class="spinner dark"></div><p>Analyzing and drafting follow-up…</p></div>`;return;}
  let h=`<div class="debrief-section"><label>Paste Call Transcript or Notes</label><textarea class="debrief-textarea" id="debriefTranscript" placeholder="Paste Fathom transcript or notes…">${esc(db.transcript)}</textarea></div><div style="margin-bottom:4px;"><button class="gen-btn" id="runDebrief">Run Debrief</button></div>`;
  if(db.output)h+=`<div class="debrief-output"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><h4>Debrief Output</h4></div><div class="brief-content" id="debriefContent">${db.output}</div></div>`;
  c.innerHTML=h;
  document.getElementById('debriefTranscript').addEventListener('input',e=>{STATE.debriefs[m.id].transcript=e.target.value;saveState();});
  document.getElementById('runDebrief').addEventListener('click',()=>runDebrief(m));
}

const DEFAULT_DEBRIEF=`You are Doss, supporting an Account Executive at Aleph — a spreadsheet-first FP&A platform.
${ALEPH_CONTEXT}
Analyze the call transcript and produce a debrief.

## Call Summary
2-3 sentences. What happened, what was the energy, where does this deal stand.

## Key Signals
What did the prospect reveal about pain, timeline, budget, decision process, competitive landscape, or internal politics? Be specific — quote their words where possible. Flag anything that speaks to Aleph fit or risk.

## Aleph Fit Assessment
Based on what you heard: how strong is the ICP fit? What data sources do they run? Are they spreadsheet-native? Any signals about competing tools they're evaluating?

## Action Items
Numbered list. Clear owner and specific deliverable for each.

## Risk Assessment
What could derail this deal? What's the single most important thing that needs to happen next?

## Follow-Up Email
Draft a follow-up email. CRITICAL WRITING RULES:
- Casual, direct, warm tone. Like a sharp colleague, not a salesperson.
- NO bullet points. NO em dashes. NO formal sign-offs like "Best regards."
- 3-5 sentences max. Mirror the prospect's language.
- End with ONE specific, concrete next step. Sound human.`;

function getDebriefSystemPrompt(title,ai,bc){
  const c=STATE.debriefTemplate.trim();
  const base=c?`You are Doss, supporting an AE at Aleph.\n${ALEPH_CONTEXT}\nFollow these debrief instructions:\n${c}`:DEFAULT_DEBRIEF;
  return`${base}\n\nMeeting: ${title}\nAttendees: ${ai}\n${bc}\n\nDirect. No filler.`;
}

async function runDebrief(m){
  const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey){alert('Enter API key in Settings.');return;}
  const t=STATE.debriefs[m.id]?.transcript?.trim();if(!t){alert('Paste transcript first.');return;}
  STATE.generating[m.id]='debrief';renderDetail();
  const bc=STATE.briefs[m.id]?`Dossier context:\n${htmlToText(STATE.briefs[m.id]).slice(0,1200)}`:'';
  const ai=(m.attendees||[]).map(a=>`${a.name||'?'} (${a.email||''})`).join(', ');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,system:getDebriefSystemPrompt(m.title,ai,bc),messages:[{role:'user',content:`Transcript:\n\n${t}`}]})});
    const data=await res.json();
    STATE.debriefs[m.id].output=markdownToHtml((data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n\n'));
  }catch(e){STATE.debriefs[m.id].output='<p style="color:var(--red)">Error.</p>';}
  delete STATE.generating[m.id];saveState();renderDetail();
}
function copyDebrief(){const el=document.getElementById('debriefContent');if(el){const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);document.execCommand('copy');s.removeAllRanges();}}

// ── UTILS ──
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function markdownToHtml(t){
  if(!t)return'';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^(?!<[hup]|<li|<ul|<\/ul|<br)(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'').replace(/<p><br><\/p>/g,'');
}
function htmlToText(h){const t=document.createElement('div');t.innerHTML=h;return t.textContent||t.innerText||'';}

  STATE.currentDate.setDate(STATE.currentDate.getDate()+offset);STATE.activeMeetingId=null;updateDateBar();

  document.getElementById('mainPanel').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>Select a meeting</h3><p>Click a meeting to generate a dossier.</p></div>`;
}
